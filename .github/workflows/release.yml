name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Strip devDependencies
        run: npm ci --omit=dev --ignore-scripts

      - name: Pack MCPB bundle
        run: npx @anthropic-ai/mcpb pack

      - name: Restore devDependencies
        run: npm install

      - name: Get bundle filename
        id: bundle
        run: echo "file=$(ls *.mcpb)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.bundle.outputs.file }}
          generate_release_notes: true
          body: |
            ## Install

            Download `${{ steps.bundle.outputs.file }}` and drag it into Claude Desktop to install.

            ## Requirements

            - Windows with WSL installed (`wsl --install`)
            - Node.js ≥ 18
